<!DOCTYPE html>
<html>
<head>
    <title>Teacher Import V2 - NO CACHE</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { color: #667eea; }
        .form-group { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="file"] { padding: 10px; border: 2px solid #ddd; border-radius: 6px; width: 100%; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        button { background: #667eea; color: white; border: none; padding: 15px 40px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #5568d3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #e7f3ff; padding: 15px; border-radius: 6px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Import Teachers (V2 - Fresh)</h1>
        
        <div class="info">
            <strong>CSV Format:</strong><br>
            name,email,max_hours_per_week<br>
            Dr. Rajesh Kumar,rajesh.kumar@college.edu,20<br>
            Prof. Priya Sharma,priya.sharma@college.edu,18
        </div>
        
        <div class="form-group">
            <label>Upload CSV File:</label>
            <input type="file" id="csvFile" accept=".csv,.txt">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="clearExisting">
            <label for="clearExisting" style="margin: 0;">⚠️ Clear existing teachers before import</label>
        </div>
        
        <button onclick="importTeachers()">Import Teachers</button>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        async function importTeachers() {
            const fileInput = document.getElementById('csvFile');
            const clearExisting = document.getElementById('clearExisting').checked;
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.textContent = 'Please select a CSV file';
                return;
            }
            
            const file = fileInput.files[0];
            
            if (clearExisting) {
                if (!confirm('⚠️ This will DELETE all existing teachers! Continue?')) {
                    return;
                }
            }
            
            const formData = new FormData();
            formData.append('dataset', 'teachers');
            formData.append('file', file);
            formData.append('force_clear_existing', clearExisting ? 'true' : 'false');
            
            resultDiv.className = 'result info';
            resultDiv.style.display = 'block';
            resultDiv.textContent = '⏳ Importing...';
            
            try {
                // Add timestamp to bypass cache
                const response = await fetch('http://localhost:8000/api/import/?t=' + Date.now(), {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    let message = `✅ Success! ${data.message}`;
                    if (data.cleared) message += `\nCleared: ${data.cleared} old teachers`;
                    if (data.lessons_cleared) message += `\nLessons cleared: ${data.lessons_cleared}`;
                    if (data.timetable_cleared) message += `\n⚠️ Timetable cleared - regenerate required`;
                    resultDiv.textContent = message;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ Error: ' + (data.detail || data.message || 'Unknown error');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
